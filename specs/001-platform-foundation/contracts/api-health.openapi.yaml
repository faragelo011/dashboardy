openapi: 3.1.0
info:
  title: Dashboardy API — Health
  version: 0.1.0
  description: |
    Operational endpoints exposed by the Dashboardy API in Phase 1
    (Platform Foundation). No domain endpoints are exposed yet.

    Realises FR-006 (liveness + readiness), FR-008 (correlation IDs),
    US3 acceptance scenarios 1–3, and SC-004 (latency targets).

servers:
  - url: https://api.staging.dashboardy.app
    description: Staging
  - url: https://api.dashboardy.app
    description: Production

paths:
  /health:
    get:
      operationId: getApiHealth
      summary: Liveness probe
      description: |
        Returns 200 if the process is responsive. Performs no I/O.
        Target latency under normal conditions: ≤ 100 ms p95 (SC-004).
      responses:
        "200":
          description: Process is alive.
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOk"
              example:
                status: ok

  /ready:
    get:
      operationId: getApiReadiness
      summary: Readiness probe
      description: |
        Returns 200 only if the API can reach its application database
        within a short internal timeout (1 s). Returns 503 otherwise.
        Target latency under normal conditions: ≤ 500 ms p95 (SC-004).
        Must flip to not-ready within 5 s of database loss (SC-004).
      responses:
        "200":
          description: API is ready to serve traffic.
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyOk"
              example:
                status: ready
        "503":
          description: "API is not ready (typically: database unreachable)."
          headers:
            X-Correlation-ID:
              $ref: "#/components/headers/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyNotReady"
              example:
                status: not_ready
                reason: database_unreachable

components:
  headers:
    CorrelationId:
      description: |
        The API always includes an `X-Correlation-ID` response header on every
        response (including errors). If the caller sends `X-Correlation-ID` on
        the request, it MUST be a UUID version 4; otherwise the API generates
        a new UUIDv4 and uses that value. The same identifier is echoed on
        `X-Correlation-ID` and in structured logs for the request (FR-008, US3
        acceptance scenario 3).
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthOk:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ReadyOk:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]

    ReadyNotReady:
      type: object
      additionalProperties: false
      required: [status, reason]
      properties:
        status:
          type: string
          enum: [not_ready]
        reason:
          type: string
          description: |
            Short machine-readable reason. MUST NOT contain secret values
            or full database error messages (FR-011, SC-007).
          enum:
            - database_unreachable
            - database_timeout
            - startup_incomplete
