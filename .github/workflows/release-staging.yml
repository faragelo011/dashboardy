name: release-staging

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/dashboardy-api:${{ steps.meta.outputs.tag }}
            ${{ secrets.REGISTRY }}/dashboardy-api:latest

      - name: Build & push Web image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/dashboardy-web:${{ steps.meta.outputs.tag }}
            ${{ secrets.REGISTRY }}/dashboardy-web:latest

      - name: Apply migrations to staging Postgres
        timeout-minutes: 10
        run: |
          set -euo pipefail
          docker run --rm \
            -e DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" \
            "${{ secrets.REGISTRY }}/dashboardy-api:${{ steps.meta.outputs.tag }}" \
            alembic upgrade head

      - name: Deploy API to Bunny staging
        uses: BunnyWay/actions/container-update-image@d15f94f8fd513950561a5996a40f99d1dd1c357c # container-update-image_0.2.1
        with:
          app_id: ${{ vars.STAGING_API_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: ${{ vars.STAGING_API_CONTAINER || 'app' }}
          image_tag: ${{ steps.meta.outputs.tag }}

      - name: Wait for API health
        run: |
          set -euo pipefail
          url="${{ secrets.STAGING_API_URL }}/health"
          for i in {1..30}; do
            if curl -fsS --connect-timeout 2 --max-time 5 "$url" >/dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy at $url"
          exit 1

      - name: Deploy Web to Bunny staging
        uses: BunnyWay/actions/container-update-image@d15f94f8fd513950561a5996a40f99d1dd1c357c # container-update-image_0.2.1
        with:
          app_id: ${{ vars.STAGING_WEB_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: ${{ vars.STAGING_WEB_CONTAINER || 'app' }}
          image_tag: ${{ steps.meta.outputs.tag }}

      - name: Wait for Web liveness
        run: |
          set -euo pipefail
          url="${{ secrets.STAGING_WEB_URL }}/api/health"
          for i in {1..30}; do
            if curl -fsS --connect-timeout 2 --max-time 5 "$url" >/dev/null; then
              echo "Web healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Web did not become healthy at $url"
          exit 1

