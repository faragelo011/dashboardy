name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_PUBLIC_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: uv sync (api)
        run: uv sync --directory apps/api --frozen

      - name: playwright install (web)
        run: pnpm --filter @dashboardy/web exec playwright install --with-deps

      - name: pnpm test (web + api)
        run: pnpm test

      - name: pnpm lint
        run: pnpm -r lint

      - name: pnpm build
        run: pnpm -r build
